<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Khai báo</title>
  <link rel="stylesheet" href="css/style.css">

  <!-- FIREBASE -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
  <link rel="icon" type="image/png" href="logo2.png">
  <!-- 🔥 THÊM: CĂN GIỮA TABLE -->
  <style>
    .table th, .table td{
      text-align: center;
      vertical-align: middle;
    }
  </style>
</head>

<body>

<div class="app">

  <div id="sidebar" class="sidebar"></div>

  <div class="main">

    <div class="header">
      <div class="header-left">
        <button type="button" onclick="toggleSidebar()" class="toggle-btn">☰</button>
        <h3>Khai báo hệ thống</h3>
      </div>

      <div class="header-right">
        <span id="userEmail">👤</span>
      </div>
    </div>

    <div class="content">

      <!-- BUTTON -->
      <div class="btn-group">
        <button type="button" onclick="openPopup('bank')">Ngân hàng</button>
        <button type="button" onclick="openPopup('source')">Nguồn tiền</button>
        <button type="button" onclick="openPopup('limit')">Hạn mức</button>
        <button type="button" onclick="openPopup('user')">User</button>
      </div>
    
      <!-- FILTER -->
      <div class="filter-bar">
        <select id="filterStatus" onchange="loadBanks()">
          <option value="all">Tất cả</option>
          <option value="true">Hoạt động</option>
          <option value="false">Không hoạt động</option>
        </select>
      </div>
    
      <!-- ================= BANK ================= -->
      <h3>Danh sách ngân hàng</h3>
      <table id="bankTable" class="table"></table>
    
      <!-- ================= SOURCE ================= -->
      <h3 style="margin-top:20px;">Nguồn tiền</h3>
      <table id="sourceTable" class="table"></table>
    
      <!-- ================= LIMIT ================= -->
      <h3 style="margin-top:20px;">Hạn mức</h3>
      <table id="limitTable" class="table"></table>
      
      <h3 style="margin-top:20px;">User</h3>
      <table id="userTable" class="table"></table>
    </div>
  </div>
</div>

<!-- POPUP -->
<div id="popup" class="popup hidden">
  <div class="popup-content" id="popupContent"></div>
</div>

<!-- SCRIPTS -->
<script src="js/firebase.js"></script>
<script src="js/auth.js"></script>
<script src="js/loadMenu.js"></script>
<script src="js/declare.js"></script>

<script>
function toggleSidebar(){
  document.querySelector('.sidebar').classList.toggle('collapsed');
  document.querySelector('.main').classList.toggle('expanded');
}

firebase.auth().onAuthStateChanged(user=>{
  if(user){
    document.getElementById("userEmail").innerText = "👤 " + user.email;
  }
});
</script>

<!-- TOAST -->
<div id="toast"></div>

</body>
</html>
