<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Cashflow</title>
  <link rel="stylesheet" href="css/style.css">

  <!-- FIREBASE -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="logo2.png">
</head>

<body>

<div class="app">

  <div id="sidebar" class="sidebar"></div>

  <div class="main">

    <!-- HEADER -->
    <div class="header">
      <div class="header-left">
        <button onclick="toggleSidebar()" class="toggle-btn">☰</button>
        <h3>Quản lý dòng tiền</h3>
      </div>

      <div class="header-right">
        <span id="userEmail">👤</span>
      </div>
    </div>

    <div class="content">

      <!-- BUTTON -->
      <div class="btn-group">
        <button onclick="openCashPopup('income')">➕ Thu tiền</button>
        <button onclick="openCashPopup('expense')">➖ Chi tiền</button>
      </div>

      <!-- SUMMARY -->
      <h3>Bảng dòng tiền</h3>

      <div class="filter-bar">
        <select id="filterBank" onchange="loadData()">
          <option value="all">Tất cả ngân hàng</option>
        </select>
        
        <select id="filterSource" onchange="loadData()">
          <option value="all">Tất cả</option>
          <option value="GN">Ghi nợ</option>
          <option value="TD">Tín dụng</option>
        </select>
      </div>
      
      <table id="balanceTable" class="table"></table>

      <!-- INCOME -->
      <h3>Thu tiền</h3>
      <table id="incomeTable" class="table"></table>

      <!-- EXPENSE -->
      <h3 style="margin-top:20px;">Chi tiền</h3>
      <table id="expenseTable" class="table"></table>

    </div>
  </div>
</div>

<!-- POPUP -->
<div id="popup" class="popup hidden">
  <div class="popup-content" id="popupContent"></div>
</div>

<!-- SCRIPT -->
<script src="js/firebase.js"></script>
<script src="js/auth.js"></script>
<script src="js/loadMenu.js"></script>
<script src="js/cashflow.js"></script>

<script>
function toggleSidebar(){
  document.querySelector('.sidebar').classList.toggle('collapsed');
  document.querySelector('.main').classList.toggle('expanded');
}

firebase.auth().onAuthStateChanged(async (user) => {
  if (user) {
    const db = firebase.firestore();

    const querySnapshot = await db.collection("users")
      .where("email", "==", user.email)
      .get();

    querySnapshot.forEach((doc) => {
      document.getElementById("userEmail").innerText = "👤 " + doc.data().name;
    });
  }
});
</script>

<div id="toast"></div>

</body>
</html>
